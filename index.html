<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Cam - LFGK</title>

    <meta property="og:image" content="./logo.png">
    <meta property="og:title" content="Garden Cam - LFGK">
    <meta property="og:description"
        content="GardenCam lets you watch the watch party at MSG using publicly available traffic camera feeds!">
    <meta property="og:url" content="https://gardencam.wttdotm.com">

    <style>
        body {
            background-color: black;
            color: #F58426;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        h1 {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
        }

        h2 {
            font-size: 1.5em;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #logo {
            max-height: 30vh;
        }

        #description {
            max-width: 40vw;
        }

        .tabButton {
            flex: 1;
            background: #006BB6;
            color: #F58426;
            border: none;
            font-size: 0.88em;
            padding: 10px 0;
            cursor: pointer;
        }

        .cameraWrap {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .cameraImage {
            max-width: 100%;
        }

        .tabContent {
            padding: 5px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            #description {
                max-width: 90vw;
            }

            #logo {
                max-width: 50vw;
            }

            .tabContent h2 {
                font-size: 1.125em;
                margin-top: 0.2em;
            }
        }
    </style>
</head>

<body>
    <div class="main" id="main">
        <img id="logo" src="./logo.png" alt="GardenCam Logo">

        <div id="description">
            <p style="max-width: 800px; margin-bottom: 5px;">
                By <a href="https://wttdotm.com" target="_blank" rel="noopener" style="color: #F58426;">WTTDOTM</a> <a href="https://wttdotm.com/assets/resume/swe_resume.pdf" target="_blank" rel="noopener" style="color: #F58426;">(hire me)</a>
            </p>
            <p style="max-width: 800px;">
                GardenCam lets you watch the Knicks hype around MSG using
                <a href="https://webcams.nyctmc.org/map" target="_blank" rel="noopener" style="color: #F58426;">publicly
                    available traffic camera feeds</a>!
                <a href="./extras.html" style="color: #F58426; font-size: 0.85em;">See other locations →</a>
            </p>
        </div>

        <div id="tabHolder" style="margin: 0 auto;">
            <div id="tabs" style="display: flex; border-bottom: 2px solid #F58426;">
                <button class="tabButton" onclick="showTab(1)" id="btnTab1">6th &amp; 34th</button>
                <button class="tabButton" onclick="showTab(2)" id="btnTab2">TS5</button>
                <button class="tabButton" onclick="showTab(3)" id="btnTab3">TS8</button>
                <button class="tabButton" onclick="showTab(4)" id="btnTab4">TS9</button>
            </div>

            <div style="text-align: center; font-size: 0.75em; color: #F58426; padding: 4px 0;">
                gardencam.wttdotm.com | recorded footage
            </div>

            <div id="tab1" class="tabContent" style="display: block;">
                <div class="cameraWrap">
                    <img id="image1" class="cameraImage" src="./assets/6x34_41-55.gif" alt="6th & 34th">
                </div>
                <h2>6th &amp; 34th</h2>
            </div>

            <div id="tab2" class="tabContent" style="display: none;">
                <div class="cameraWrap">
                    <img id="image2" class="cameraImage" src="./assets/TS5_29-36.gif" alt="TS5">
                </div>
                <h2>TS5</h2>
            </div>

            <div id="tab3" class="tabContent" style="display: none;">
                <div class="cameraWrap">
                    <img id="image3" class="cameraImage" src="./assets/TS8_25-34.gif" alt="TS8">
                </div>
                <h2>TS8</h2>
            </div>

            <div id="tab4" class="tabContent" style="display: none;">
                <div class="cameraWrap">
                    <img id="image4" class="cameraImage" src="./assets/TS9_24-30.gif" alt="TS9">
                </div>
                <h2>TS9</h2>
            </div>
        </div>

        <p style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 0.85em; margin: 0; white-space: nowrap;">
            <a href="https://drive.google.com/drive/folders/10sd-jvrk5kQX-mMLMHU_1vdhYn8EvsqS?usp=drive_link" target="_blank" rel="noopener" style="color: #F58426;">Watch June 8th perimeter footage</a>
        </p>
    </div>

    <script>
        fetch(`https://wemakeinter.net/diyPixel/morryProjPixel.php?event=pageView&project=gardencam`);

        function updateTabUI(tabNum) {
            document.getElementById('tab1').style.display = tabNum === 1 ? 'block' : 'none';
            document.getElementById('tab2').style.display = tabNum === 2 ? 'block' : 'none';
            document.getElementById('tab3').style.display = tabNum === 3 ? 'block' : 'none';
            document.getElementById('tab4').style.display = tabNum === 4 ? 'block' : 'none';

            document.getElementById('btnTab1').style.borderBottom = tabNum === 1 ? '4px solid #F58426' : 'none';
            document.getElementById('btnTab2').style.borderBottom = tabNum === 2 ? '4px solid #F58426' : 'none';
            document.getElementById('btnTab3').style.borderBottom = tabNum === 3 ? '4px solid #F58426' : 'none';
            document.getElementById('btnTab4').style.borderBottom = tabNum === 4 ? '4px solid #F58426' : 'none';

            document.getElementById('btnTab1').style.fontWeight = tabNum === 1 ? 'bold' : 'normal';
            document.getElementById('btnTab2').style.fontWeight = tabNum === 2 ? 'bold' : 'normal';
            document.getElementById('btnTab3').style.fontWeight = tabNum === 3 ? 'bold' : 'normal';
            document.getElementById('btnTab4').style.fontWeight = tabNum === 4 ? 'bold' : 'normal';
        }

        function showTab(tabNum) {
            updateTabUI(tabNum);
        }
    </script>
</body>

</html>
